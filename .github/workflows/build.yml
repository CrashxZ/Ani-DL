name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore AniDL.slnx
      - name: Build
        run: dotnet build AniDL.slnx -c Release --no-restore
      - name: Test
        run: dotnet test tests/Jellyfin.Plugin.AniDL.Tests/Jellyfin.Plugin.AniDL.Tests.csproj -c Release --no-build
      - name: Validate web scripts
        run: |
          node --input-type=module --check < src/Jellyfin.Plugin.AniDL/Web/anidl.js
          node --input-type=module --check < src/Jellyfin.Plugin.AniDL/Web/config.js
      - name: Publish plugin
        run: dotnet publish src/Jellyfin.Plugin.AniDL/Jellyfin.Plugin.AniDL.csproj -c Release --no-build -o artifacts/AniDL
      - name: Package plugin
        run: cd artifacts && zip -r AniDL-0.1.0.4.zip AniDL
      - uses: actions/upload-artifact@v4
        with:
          name: AniDL-0.1.0.4
          path: artifacts/AniDL-0.1.0.4.zip
